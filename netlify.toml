# Netlify build config for StocksIntels frontend
# 1. Deploy this repo to Netlify.
# 2. Update VITE_API_URL below (or in the Netlify UI) to point to your Render backend URL.
# 3. Add all frontend API keys (VITE_NEWSAPI_KEY, VITE_FINNHUB_KEY, etc.) in the Netlify UI.

[build]
  command = "pnpm run build"
  publish = "frontend/dist"

[build.environment]
  # TODO: Replace with your actual Render backend URL once it's deployed
  VITE_API_URL = "https://stockintel-backend.onrender.com/api"
  NODE_VERSION = "20"

# SPA fallback so React Router handles all client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
