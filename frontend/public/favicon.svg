<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D7490"/>
      <stop offset="50%" stop-color="#0A8BA8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0D7490" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Base rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Baseline -->
  <line x1="6" y1="25" x2="26" y2="25" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Candlestick 1 -->
  <rect x="8" y="19" width="3.5" height="6" rx="0.5" fill="url(#bar3)"/>
  <line x1="9.75" y1="17" x2="9.75" y2="19" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Candlestick 2 -->
  <rect x="13" y="14" width="3.5" height="11" rx="0.5" fill="url(#bar1)"/>
  <line x1="14.75" y1="12.5" x2="14.75" y2="14" stroke="#34D399" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Candlestick 3 -->
  <rect x="18" y="11" width="3.5" height="14" rx="0.5" fill="url(#bar2)"/>
  <line x1="19.75" y1="9.5" x2="19.75" y2="11" stroke="#6EE7B7" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Candlestick 4 -->
  <rect x="23" y="17" width="3.5" height="8" rx="0.5" fill="url(#bar1)"/>
  <line x1="24.75" y1="15.5" x2="24.75" y2="17" stroke="#34D399" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Trend line -->
  <path d="M9.75 20.5 L14.75 15.5 L19.75 12.5 L24.75 17.5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Glow dot -->
  <circle cx="24.75" cy="17.5" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="24.75" cy="17.5" r="3" fill="white" opacity="0.15"/>
</svg>
